version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PYTHON ANALYSIS SERVICE (internal only)
  # ═══════════════════════════════════════════════════════════════════════════
  analysis-service:
    image: ghcr.io/kopianan/buzzer-analyzer:latest
    container_name: buzzer-analyzer
    restart: unless-stopped
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - IG_SESSION_ID=${IG_SESSION_ID:-}
      - TT_SESSION_ID=${TT_SESSION_ID:-}
      - X_AUTH_TOKEN=${X_AUTH_TOKEN:-}
    networks:
      - buzzer-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════
  # NEXT.JS WEB APP — diakses via Traefik (buzzer.technokh.com)
  # ═══════════════════════════════════════════════════════════════════════════
  web-app:
    image: ghcr.io/kopianan/buzzer-web:latest
    container_name: buzzer-web
    restart: unless-stopped
    environment:
      - PYTHON_SERVICE_URL=http://analysis-service:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_AI_WEBHOOK_URL=${N8N_AI_WEBHOOK_URL:-}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - buzzer-network
      - proxy_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.buzzer.rule=Host(`buzzer.technokh.com`)"
      - "traefik.http.routers.buzzer.entrypoints=websecure"
      - "traefik.http.routers.buzzer.tls=true"
      - "traefik.http.routers.buzzer.tls.certresolver=myresolver"
      - "traefik.http.services.buzzer.loadbalancer.server.port=3000"
    depends_on:
      analysis-service:
        condition: service_healthy

networks:
  buzzer-network:
    driver: bridge
  proxy_public:
    external: true
